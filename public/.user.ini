; Per-directory PHP overrides for Hostinger production.
; On shared hosting (Hostinger), php.ini cannot be edited directly — drop
; this file at public/.user.ini instead. Apache/CGI reads it on every request.
; Values here support uploading videos up to ~1 GB (e.g. 4K 5-minute clips).

upload_max_filesize = 1024M
post_max_size       = 1100M
memory_limit        = 512M
max_execution_time  = 300
max_input_time      = 300
